name: CI/CD - Cloud Document Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # 1 + 2 : Installation des dépendances + vérification du code
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
      - name: Installer Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Installer les dépendances Python
        run: |
          python -m pip install --upgrade pip
          pip install -r src/api/requirements.txt
          pip install -r src/functions/requirements.txt
      - name: Vérification du code Python
        run: |
          python -m py_compile src/api/app/*.py
          python -m py_compile src/functions/*.py

  # 3 + 4 : Build du frontend React + déploiement (Static Web Apps)
  frontend:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Installer les dépendances du frontend
        run: npm ci
        working-directory: src/web
      - name: Build du frontend React
        run: npm run build
        working-directory: src/web
      - name: Déploiement du frontend (Azure Static Web Apps)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APP_TOKEN }}
          action: "upload"
          app_location: "src/web/dist"
          skip_app_build: true

  # 5 : Déploiement des Azure Functions
  functions:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
      - name: Installer Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Connexion à Azure
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            }
      - name: Déploiement des Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTION_APP_NAME }}
          package: src/functions
          scm-do-build-during-deployment: true
          enable-oryx-build: true
